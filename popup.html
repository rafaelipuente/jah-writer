<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JAH Writer</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #1e1e1e;
      --s1:       #252526;
      --s2:       #2d2d30;
      --s3:       #3c3c3c;
      --border:   rgba(255,255,255,0.10);
      --border-h: rgba(255,255,255,0.20);
      --accent:   #E95420;
      --accent-h: #f26b3a;
      --accent-dim: rgba(233,84,32,0.14);
      --green:    #4ec56b;
      --green-dim:rgba(78,197,107,0.14);
      --red:      #e5534b;
      --text:     #e8e8e8;
      --text-2:   #b0b0b0;
      --text-3:   #808080;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', 'Ubuntu', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .hdr::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-logo {
      width: 36px; height: 36px; border-radius: 6px;
      background: var(--s2);
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .brand-name { font-size: 20px; font-weight: 700; letter-spacing: 0.04em; color: #fff; line-height: 1; }
    .brand-sub { font-size: 11px; font-weight: 500; color: var(--text-3); margin-top: 2px; letter-spacing: 0.02em; }

    .status-pill {
      display: flex; align-items: center; gap: 7px; padding: 7px 14px;
      border-radius: 6px; background: var(--s2); border: 1px solid var(--border);
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-3); cursor: pointer; user-select: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .status-pill:hover { border-color: var(--border-h); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; transition: background 0.2s, box-shadow 0.2s; }
    .status-dot.on { background: var(--green); box-shadow: 0 0 8px rgba(78,197,107,0.5); }
    #stat.on { color: var(--green); }
    .pill-chevron { width: 12px; height: 12px; opacity: 0.5; transition: transform 0.2s; flex-shrink: 0; }
    .status-pill.open .pill-chevron { transform: rotate(180deg); }

    /* ── Settings ── */
    .settings { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; background: var(--s1); border-bottom: 1px solid transparent; }
    .settings.open { max-height: 400px; border-bottom-color: var(--border); }
    .settings-inner { padding: 16px 20px; }
    .settings-section { margin-bottom: 16px; }
    .settings-section:last-child { margin-bottom: 0; }
    .settings-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }

    .provider-row { display: flex; gap: 8px; }
    .provider-btn {
      flex: 1; padding: 10px 14px; background: var(--s3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-3); font-size: 12px; font-weight: 600;
      font-family: 'IBM Plex Sans', system-ui, sans-serif; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .provider-btn:hover { border-color: var(--border-h); color: var(--text-2); }
    .provider-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }

    .key-row { display: flex; align-items: center; gap: 10px; }

    .api-in {
      flex: 1; padding: 10px 14px; background: var(--s3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px;
      font-family: 'IBM Plex Mono', monospace; outline: none; transition: border-color 0.15s;
    }
    .api-in::placeholder { color: var(--text-3); }
    .api-in:focus { border-color: var(--accent); }

    .save-btn {
      padding: 10px 20px; background: var(--accent); border: none; border-radius: 6px;
      color: #fff; font-size: 12px; font-weight: 700; font-family: 'IBM Plex Sans', system-ui, sans-serif;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
      transition: background 0.15s, transform 0.1s; white-space: nowrap; flex-shrink: 0;
    }
    .save-btn:hover { background: var(--accent-h); }
    .save-btn:active { transform: scale(0.97); }

    .save-ok { font-size: 12px; font-weight: 500; color: var(--green); margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
    .save-ok.show { opacity: 1; }

    /* Blocklist */
    .site-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--s3); border: 1px solid var(--border); border-radius: 6px; }
    .site-toggle-host { font-size: 12px; color: var(--text-2); font-family: 'IBM Plex Mono', monospace; }

    .toggle-switch { position: relative; width: 38px; height: 20px; flex-shrink: 0; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track { position: absolute; inset: 0; background: var(--s2); border: 1px solid var(--border); border-radius: 10px; transition: background 0.15s; }
    .toggle-switch input:checked + .toggle-track { background: rgba(233,84,32,0.3); border-color: rgba(233,84,32,0.4); }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--text-3); transition: transform 0.15s, background 0.15s; pointer-events: none; }
    .toggle-switch input:checked ~ .toggle-knob { transform: translateX(18px); background: var(--accent); }

    .blocked-list { margin-top: 8px; }
    .blocked-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; font-size: 12px; color: var(--text-3); font-family: 'IBM Plex Mono', monospace; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .blocked-item:last-child { border-bottom: none; }
    .blocked-remove { all: unset; color: var(--text-3); font-size: 16px; cursor: pointer; padding: 0 4px; transition: color 0.1s; }
    .blocked-remove:hover { color: var(--red); }

    /* ── Main Body ── */
    .body { padding: 20px 20px 0; }
    .field-label { font-size: 12px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-2); margin-bottom: 8px; }

    .compose-wrap { position: relative; }
    .compose-box {
      width: 100%; height: 100px; padding: 14px 16px; background: var(--s2);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 15px; font-family: 'IBM Plex Sans', system-ui, sans-serif; line-height: 1.6;
      resize: vertical; outline: none; transition: border-color 0.15s; min-height: 80px;
    }
    .compose-box::placeholder { color: var(--text-3); font-size: 14px; }
    .compose-box:focus { border-color: var(--accent); }

    .word-count {
      font-size: 12px; font-weight: 500; color: var(--text-3); margin-top: 6px;
      text-align: right; font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Mode Grid ── */
    .modes-label { font-size: 12px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-2); margin: 14px 0 10px; }
    .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .mode {
      display: flex; align-items: center; gap: 8px; padding: 11px 12px;
      background: var(--s2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-2); font-size: 12.5px; font-weight: 500;
      font-family: 'IBM Plex Sans', system-ui, sans-serif; cursor: pointer;
      transition: all 0.12s; text-align: left; line-height: 1.2;
    }
    .mode:hover { background: var(--accent-dim); border-color: rgba(233,84,32,0.4); color: var(--text); }
    .mode:active { transform: scale(0.97); }
    .mode-last { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .mode-ico { display: inline-flex; align-items: center; flex-shrink: 0; line-height: 1; opacity: 0.65; }
    .mode:hover .mode-ico { opacity: 1; }
    .mode-last .mode-ico { opacity: 1; }
    .mode-lbl { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Search button */
    .search-btn {
      display: flex; align-items: center; gap: 8px; width: 100%; margin-top: 8px;
      padding: 11px 12px; background: var(--s2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-3); font-size: 12.5px; font-weight: 500;
      font-family: 'IBM Plex Sans', system-ui, sans-serif; cursor: pointer;
      transition: all 0.12s; text-align: left;
    }
    .search-btn:hover { background: rgba(59,130,246,0.08); border-color: rgba(96,165,250,0.3); color: var(--text); }
    .search-btn:active { transform: scale(0.98); }

    /* ── Fact Check ── */
    .fc-claim { background: var(--s2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; }
    .fc-claim-text { font-weight: 600; color: var(--text); margin-bottom: 6px; font-size: 13px; line-height: 1.5; }
    .fc-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; margin-bottom: 4px; }
    .fc-true { background: var(--green-dim); color: var(--green); border: 1px solid rgba(78,197,107,0.25); }
    .fc-false { background: rgba(229,83,75,0.12); color: var(--red); border: 1px solid rgba(229,83,75,0.25); }
    .fc-mixed { background: rgba(234,179,8,0.10); color: #fde68a; border: 1px solid rgba(234,179,8,0.2); }
    .fc-exp { font-size: 12px; color: var(--text-3); line-height: 1.5; margin-top: 4px; }
    .fc-verdict { display: flex; align-items: center; gap: 10px; padding-top: 12px; margin-top: 8px; border-top: 1px solid var(--border); }
    .fc-verdict-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-3); text-transform: uppercase; }
    .fc-verdict .fc-badge { font-size: 11px; padding: 4px 12px; }

    /* ── Loader ── */
    .loader { display: none; align-items: center; justify-content: center; gap: 12px; padding: 30px 20px; color: var(--text-3); font-size: 13px; font-weight: 500; }
    .loader.on { display: flex; }
    .loader-ring { width: 18px; height: 18px; border: 2.5px solid var(--s3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Output ── */
    .output { display: none; }
    .output.on { display: block; }
    .output-wrap { margin: 16px 20px 0; }

    .output-tabs { display: flex; gap: 0; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
    .output-tab {
      all: unset; padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--text-3);
      cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.12s;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .output-tab:hover { color: var(--text-2); }
    .output-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .output-box {
      background: var(--s2); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; font-size: 14px; line-height: 1.7; color: var(--text);
      max-height: 180px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
    }
    .output-box::-webkit-scrollbar { width: 5px; }
    .output-box::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 3px; }

    .output-side { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .output-side-pane {
      background: var(--s2); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; font-size: 13px; line-height: 1.65; color: var(--text);
      max-height: 180px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
    }
    .output-side-pane::-webkit-scrollbar { width: 4px; }
    .output-side-pane::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }
    .output-side-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
    .output-side-original { border-color: rgba(229,83,75,0.2); }
    .output-side-result { border-color: rgba(78,197,107,0.2); }

    .output-actions { display: flex; gap: 8px; margin-top: 10px; }
    .copy-out {
      padding: 9px 20px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--s2); color: var(--text-2); font-size: 12px; font-weight: 600;
      font-family: 'IBM Plex Sans', system-ui, sans-serif; letter-spacing: 0.06em;
      text-transform: uppercase; cursor: pointer; transition: all 0.12s;
    }
    .copy-out:hover { border-color: rgba(233,84,32,0.4); background: var(--accent-dim); color: var(--text); }
    .copy-out:active { transform: scale(0.97); }

    /* ── History ── */
    .history-section { padding: 0 20px; margin-top: 16px; }
    .history-toggle {
      all: unset; display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-3); cursor: pointer;
      transition: color 0.12s; padding: 4px 0;
    }
    .history-toggle:hover { color: var(--text-2); }
    .history-toggle .hist-chevron { width: 10px; height: 10px; transition: transform 0.2s; }
    .history-toggle.open .hist-chevron { transform: rotate(180deg); }
    .history-list { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
    .history-list.open { max-height: 400px; overflow-y: auto; }
    .history-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: background 0.1s;
    }
    .history-item:hover { background: rgba(255,255,255,0.02); }
    .history-item:last-child { border-bottom: none; }
    .hist-mode { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; min-width: 70px; padding-top: 2px; }
    .hist-preview { font-size: 12px; color: var(--text-3); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; flex: 1; }
    .hist-time { font-size: 10px; color: var(--text-3); white-space: nowrap; padding-top: 2px; font-family: 'IBM Plex Mono', monospace; }
    .hist-empty { font-size: 12px; color: var(--text-3); padding: 12px 0; }

    /* ── Footer ── */
    .foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; margin-top: 16px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-3);
    }
    .foot-privacy { display: flex; align-items: center; gap: 5px; }
    .foot-shortcuts { font-size: 10px; color: var(--text-3); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>

  <div class="hdr">
    <div class="brand">
      <div class="brand-logo">
        <img src="icons/icon128.png" alt="JAH Writer logo">
      </div>
      <div>
        <div class="brand-name">JAH Writer</div>
        <div class="brand-sub">Text Assistant</div>
      </div>
    </div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot" id="dot"></div>
      <span id="stat">Offline</span>
      <svg class="pill-chevron" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <div class="settings" id="settings">
    <div class="settings-inner">
      <div class="settings-section">
        <div class="settings-label">AI Provider</div>
        <div class="provider-row">
          <button class="provider-btn active" id="provGemini" data-prov="gemini">Gemini</button>
          <button class="provider-btn" id="provOpenai" data-prov="openai">OpenAI</button>
        </div>
      </div>
      <div class="settings-section" id="geminiKeySection">
        <div class="settings-label">Gemini API Key</div>
        <div class="key-row">
          <input type="password" class="api-in" id="geminiKeyIn" placeholder="Paste your Gemini API key..." spellcheck="false" autocomplete="off" />
        </div>
      </div>
      <div class="settings-section" id="openaiKeySection" style="display:none;">
        <div class="settings-label">OpenAI API Key</div>
        <div class="key-row">
          <input type="password" class="api-in" id="openaiKeyIn" placeholder="Paste your OpenAI API key..." spellcheck="false" autocomplete="off" />
        </div>
      </div>
      <div class="settings-section">
        <div class="key-row">
          <button class="save-btn" id="saveBtn">Save</button>
        </div>
        <div class="save-ok" id="saveOk">Settings saved</div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Current Site</div>
        <div class="site-toggle" id="siteToggle">
          <span class="site-toggle-host" id="siteHost">---</span>
          <label class="toggle-switch">
            <input type="checkbox" id="siteEnabled" checked>
            <div class="toggle-track"></div>
            <div class="toggle-knob"></div>
          </label>
        </div>
        <div class="blocked-list" id="blockedList"></div>
      </div>
    </div>
  </div>

  <div class="body">
    <div class="field-label">Your Text</div>
    <div class="compose-wrap">
      <textarea class="compose-box" id="compIn" placeholder="Paste or type your text here..."></textarea>
      <div class="word-count" id="wordCount">0 words / 0 characters</div>
    </div>
    <div class="modes-label">Choose a Mode</div>
    <div class="modes" id="modeGrid"></div>
    <button class="search-btn" id="searchBtn">
      <span class="mode-ico" id="searchIco"></span>
      <span>Search this text on Google</span>
    </button>
  </div>

  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <span>Processing your text...</span>
  </div>

  <div class="output" id="outSect">
    <div class="output-wrap">
      <div class="output-tabs">
        <button class="output-tab active" id="tabResult">Result</button>
        <button class="output-tab" id="tabCompare">Compare</button>
      </div>
      <div id="outResult">
        <div class="output-box" id="outBox"></div>
      </div>
      <div id="outCompare" style="display:none;">
        <div class="output-side">
          <div>
            <div class="output-side-label">Original</div>
            <div class="output-side-pane output-side-original" id="outOriginal"></div>
          </div>
          <div>
            <div class="output-side-label">Improved</div>
            <div class="output-side-pane output-side-result" id="outImproved"></div>
          </div>
        </div>
      </div>
      <div class="output-actions">
        <button class="copy-out" id="copyOut">Copy Result</button>
      </div>
    </div>
  </div>

  <div class="history-section">
    <button class="history-toggle" id="histToggle">
      Recent
      <svg class="hist-chevron" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="history-list" id="histList"></div>
  </div>

  <div class="foot">
    <div>
      <span>Select text anywhere</span>
      <div class="foot-shortcuts">Ctrl+Shift+J (Cmd+Shift+J on Mac)</div>
    </div>
    <span class="foot-privacy">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Private
    </span>
  </div>

  <script src="modes.js"></script>
  <script src="icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
